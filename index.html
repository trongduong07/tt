<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tournament Pro - GCSL 2026</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />
    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ["Inter", "sans-serif"], 
                        display: ["Oswald", "sans-serif"] 
                    },
                    colors: { 
                        gold: '#facc15', 
                        dark: '#08080c'
                    }
                }
            }
        }
    </script>
    <style>
        /* CSS thuần để tránh lỗi @layer của Tailwind CDN */
        body {
            background-color: #08080c;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        .bold-title {
            font-size: 3.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            line-height: 0.85;
            letter-spacing: -0.05em;
            color: #facc15;
            filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.4));
        }
        @media (min-width: 768px) { .bold-title { font-size: 5rem; } }
        @media (min-width: 1024px) { .bold-title { font-size: 6rem; } }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            backdrop-filter: blur(4px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(250, 204, 21, 0.3);
            border-radius: 10px;
        }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Core React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <!-- Dependencies -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>
    <script src="https://unpkg.com/clsx@2.1.0/dist/clsx.min.js"></script>
    <script src="https://unpkg.com/tailwind-merge@2.2.1/dist/bundle-umd.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { Trophy, Users, Calendar, LayoutGrid, Settings, Sword, Medal, Camera, Download, Upload, RefreshCw, LogOut } = lucide;
        const { toPng } = htmlToImage;
        const { twMerge } = TailwindMerge;

        function cn(...inputs) { return twMerge(clsx(...inputs)); }

        // --- Data Khởi Tạo ---
        const INITIAL_TEAMS = Array.from({ length: 16 }, (_, i) => ({
            id: `team-${i + 1}`, 
            name: `Đội Tuyển ${String(i + 1).padStart(2, '0')}`, 
            points: 0, played: 0, wins: 0, losses: 0, gd: 0, prevOpponents: []
        }));

        // --- Logic Tính Toán (Swiss System) ---
        function calculateStats(teams, matches) {
            const teamMap = new Map(teams.map(t => [t.id, { ...t, points: 0, played: 0, wins: 0, losses: 0, goalsFor: 0, goalsAgainst: 0, gd: 0, prevOpponents: [] }]));
            
            matches.filter(m => m.isFinished && m.stage === 'SWISS').forEach(m => {
                const h = teamMap.get(m.homeTeamId), a = teamMap.get(m.awayTeamId);
                if (h && a) {
                    h.played++; a.played++;
                    h.goalsFor += (m.homeScore || 0); h.goalsAgainst += (m.awayScore || 0);
                    a.goalsFor += (m.awayScore || 0); a.goalsAgainst += (m.homeScore || 0);
                    h.prevOpponents.push(a.id); a.prevOpponents.push(h.id);
                    
                    const hWon = (m.homeScore || 0) > (m.awayScore || 0) || ((m.homeScore || 0) === (m.awayScore || 0) && (m.homePen || 0) > (m.awayPen || 0));
                    if (hWon) { h.wins++; h.points += 3; a.losses++; } else { a.wins++; a.points += 3; h.losses++; }
                }
            });

            const res = Array.from(teamMap.values());
            res.forEach(t => { t.gd = (t.goalsFor || 0) - (t.goalsAgainst || 0); });

            return res.sort((a, b) => {
                if (b.points !== a.points) return b.points - a.points;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.wins - a.wins;
            });
        }

        // --- Pairings Logic ---
        function generateSwissPairings(sortedTeams) {
            const paired = new Set();
            const pairings = [];
            for (let i = 0; i < sortedTeams.length; i++) {
                const tA = sortedTeams[i];
                if (paired.has(tA.id)) continue;
                for (let j = i + 1; j < sortedTeams.length; j++) {
                    const tB = sortedTeams[j];
                    if (!paired.has(tB.id) && !tA.prevOpponents.includes(tB.id)) {
                        pairings.push([tA.id, tB.id]);
                        paired.add(tA.id);
                        paired.add(tB.id);
                        break;
                    }
                }
            }
            return pairings;
        }

        // --- Component App Chính ---
        function App() {
            const [view, setView] = useState(null);
            const [pass, setPass] = useState('');
            const [stage, setStage] = useState('SWISS');
            const [teams, setTeams] = useState(INITIAL_TEAMS);
            const [matches, setMatches] = useState([]);
            const [isInit, setIsInit] = useState(false);

            // Load dữ liệu
            useEffect(() => {
                const saved = localStorage.getItem('gcsl_data_v1');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        setTeams(parsed.teams || INITIAL_TEAMS);
                        setMatches(parsed.matches || []);
                        setStage(parsed.stage || 'SWISS');
                        setView(parsed.view || null);
                    } catch(e) { console.error(e); }
                }
                setIsInit(true);
            }, []);

            // Lưu dữ liệu
            useEffect(() => {
                if (isInit) {
                    localStorage.setItem('gcsl_data_v1', JSON.stringify({ teams, matches, stage, view }));
                }
            }, [teams, matches, stage, view, isInit]);

            const sorted = useMemo(() => calculateStats(teams, matches), [teams, matches]);
            const curRd = useMemo(() => {
                const swiss = matches.filter(m => m.stage === 'SWISS');
                return swiss.length ? Math.max(...swiss.map(m => m.round)) : 0;
            }, [matches]);

            // Handlers
            const saveResult = (id, hs, as) => {
                setMatches(prev => prev.map(m => m.id === id ? { ...m, homeScore: hs, awayScore: as, isFinished: true } : m));
            };

            const resetMatch = (id) => {
                setMatches(prev => prev.map(m => m.id === id ? { ...m, isFinished: false } : m));
            };

            const generateNextRound = () => {
                const pairs = generateSwissPairings(sorted);
                if (!pairs.length) return alert('Không thể tạo cặp đấu mới!');
                const newMatches = pairs.map(p => ({
                    id: `m-${Date.now()}-${Math.random()}`,
                    homeTeamId: p[0],
                    awayTeamId: p[1],
                    round: curRd + 1,
                    stage: 'SWISS',
                    isFinished: false
                }));
                setMatches(prev => [...prev, ...newMatches]);
            };

            const logout = () => {
                if (confirm('Bạn muốn thoát chế độ hiện tại?')) {
                    setView(null);
                    setPass('');
                }
            };

            const exportImg = async (id, name) => {
                const el = document.getElementById(id);
                if (!el) return;
                try {
                    const dataUrl = await toPng(el, { backgroundColor: '#08080c' });
                    const link = document.createElement('a');
                    link.download = `${name}.png`;
                    link.href = dataUrl;
                    link.click();
                } catch(e) { alert('Lỗi xuất ảnh!'); }
            };

            // Màn hình chọn chế độ
            if (!view) return (
                <div className="h-screen flex items-center justify-center p-4">
                    <div className="glass-card p-10 w-full max-w-md text-center shadow-2xl">
                        <h1 className="bold-title text-4xl mb-10">GCSL 2026</h1>
                        <div className="space-y-4">
                            <input 
                                type="password" 
                                value={pass} 
                                onChange={e => setPass(e.target.value)} 
                                placeholder="Nhập mã Admin..." 
                                className="w-full bg-white/5 border border-white/10 p-3 rounded text-center text-white outline-none focus:border-gold transition-colors"
                            />
                            <button 
                                onClick={() => pass === 'GCSLADMIN' ? setView('admin') : alert('Mã Admin sai!')} 
                                className="w-full py-4 bg-gold text-black font-black uppercase italic rounded-md hover:scale-105 transition-transform"
                            >
                                QUẢN TRỊ VIÊN
                            </button>
                            <div className="pt-4 border-t border-white/10">
                                <button 
                                    onClick={() => setView('viewer')} 
                                    className="w-full py-4 bg-white/5 border border-white/10 text-white font-bold uppercase rounded-md hover:bg-white/10 transition-colors"
                                >
                                    CHẾ ĐỘ KHÁN GIẢ
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* Header */}
                    <header className="p-6 border-b border-gold/20 flex justify-between items-end px-10 shrink-0">
                        <div>
                            <h1 className="bold-title">GIO CAI SUMMER</h1>
                            <h1 className="bold-title text-3xl md:text-5xl">LEAGUE 2026</h1>
                        </div>
                        <div className="flex gap-4 mb-2">
                            <button onClick={logout} className="bg-white/10 px-4 py-2 rounded text-xs font-black italic hover:bg-white/20">THOÁT</button>
                            {view === 'admin' && (
                                <button 
                                    onClick={() => confirm('Xóa sạch dữ liệu?') && (localStorage.clear(), location.reload())}
                                    className="bg-red-500/20 text-red-500 px-4 py-2 rounded text-xs font-black italic border border-red-500/20"
                                >
                                    RESET
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Nav */}
                    <nav className="flex gap-4 p-4 px-10 shrink-0">
                        {['SWISS', 'PLAYOFF', 'KO'].map(s => (
                            <button 
                                key={s} 
                                onClick={() => setStage(s)}
                                className={cn(
                                    "px-6 py-2 text-[10px] uppercase font-black italic rounded transition-all",
                                    stage === s ? "bg-gold text-black translate-y-[-2px] shadow-lg" : "bg-white/5 text-gray-500 hover:text-white"
                                )}
                            >
                                {s === 'SWISS' ? 'Vòng Thụy Sĩ' : s === 'PLAYOFF' ? 'Vòng Play-off' : 'Vòng Loại Trực Tiếp'}
                            </button>
                        ))}
                    </nav>

                    {/* Content */}
                    <main className="flex-1 overflow-hidden p-10 pt-4">
                        <AnimatePresence mode="wait">
                            {stage === 'SWISS' ? (
                                <motion.div 
                                    key="swiss"
                                    initial={{ opacity: 0, x: 20 }} 
                                    animate={{ opacity: 1, x: 0 }} 
                                    exit={{ opacity: 0, x: -20 }}
                                    className="grid grid-cols-12 gap-8 h-full"
                                >
                                    {/* BXH */}
                                    <div className="col-span-12 lg:col-span-4 flex flex-col overflow-hidden glass-card">
                                        <div className="p-4 bg-gold text-black font-black flex justify-between items-center shrink-0">
                                            <span>BẢNG XẾP HẠNG</span>
                                            <button onClick={() => exportImg('bxh-capture', 'BXH_GCSL_2026')} className="hover:scale-110 transition-transform">
                                                <Camera className="w-4 h-4"/>
                                            </button>
                                        </div>
                                        <div id="bxh-capture" className="flex-1 overflow-y-auto custom-scrollbar p-2 bg-[#08080c]">
                                            <table className="w-full text-xs">
                                                <thead className="text-gray-500 border-b border-white/5">
                                                    <tr>
                                                        <th className="p-2 text-left">#</th>
                                                        <th className="text-left">ĐỘI TUYỂN</th>
                                                        <th>W-L</th>
                                                        <th>GD</th>
                                                        <th className="text-right pr-4">PTS</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {sorted.map((t, i) => (
                                                        <tr key={t.id} className="border-b border-white/5 hover:bg-white/5 transition-colors">
                                                            <td className="p-3 font-black text-gray-400">{i+1}</td>
                                                            <td className="font-bold uppercase text-gold/90">{t.name}</td>
                                                            <td className="text-center">{t.wins}-{t.losses}</td>
                                                            <td className="text-center">{t.gd > 0 ? `+${t.gd}` : t.gd}</td>
                                                            <td className="font-black text-gold text-right pr-4 text-base">{t.points}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* Danh sách trận */}
                                    <div className="col-span-12 lg:col-span-8 flex flex-col overflow-hidden">
                                        <div className="flex justify-between items-center mb-6 shrink-0">
                                            <h2 className="text-2xl font-black italic text-gold uppercase tracking-tighter">Match Center</h2>
                                            {view === 'admin' && curRd < 4 && (
                                                <button 
                                                    onClick={generateNextRound}
                                                    className="bg-gold text-black px-6 py-2 rounded font-black italic text-xs hover:scale-105 transition-transform"
                                                >
                                                    TẠO VÒNG {curRd + 1}
                                                </button>
                                            )}
                                        </div>
                                        <div className="flex-1 overflow-y-auto custom-scrollbar space-y-8 pr-2">
                                            {[4, 3, 2, 1].map(r => {
                                                const rMatches = matches.filter(m => m.stage === 'SWISS' && m.round === r);
                                                if (!rMatches.length) return null;
                                                return (
                                                    <div key={r}>
                                                        <div className="flex items-center gap-4 mb-4">
                                                            <div className="h-[2px] flex-1 bg-white/5"></div>
                                                            <h4 className="text-[10px] font-black text-gray-500 uppercase tracking-[0.3em]">ROUND {r}</h4>
                                                            <div className="h-[2px] flex-1 bg-white/5"></div>
                                                        </div>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                            {rMatches.map(m => (
                                                                <MatchCard 
                                                                    key={m.id} 
                                                                    match={m} 
                                                                    teams={teams} 
                                                                    onSave={saveResult} 
                                                                    onReset={resetMatch} 
                                                                    view={view}
                                                                />
                                                            ))}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </motion.div>
                            ) : (
                                <motion.div 
                                    key="others"
                                    initial={{ opacity: 0 }} 
                                    animate={{ opacity: 1 }}
                                    className="h-full flex items-center justify-center text-center"
                                >
                                    <div>
                                        <Medal className="w-20 h-20 text-gold/20 mx-auto mb-6 animate-pulse"/>
                                        <h2 className="text-4xl font-black italic text-white/20 uppercase">Coming Soon</h2>
                                        <p className="text-gray-500 font-bold uppercase tracking-widest mt-2">Hoàn thành vòng Thụy Sĩ để mở khóa</p>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>
                    </main>

                    {/* Footer */}
                    <footer className="p-4 border-t border-white/5 text-[9px] font-black text-gray-600 uppercase tracking-[0.4em] text-center shrink-0">
                        GCSL SYSTEM V1.2.0 • BY PROFESSIONAL TOURNAMENT ENGINE
                    </footer>
                </div>
            );
        }

        function MatchCard({ match, teams, onSave, onReset, view }) {
            const h = teams.find(t => t.id === match.homeTeamId);
            const a = teams.find(t => t.id === match.awayTeamId);
            const [hS, setHS] = useState(match.homeScore || 0);
            const [aS, setAS] = useState(match.awayScore || 0);

            return (
                <div className={cn(
                    "glass-card p-4 transition-all hover:border-gold/30",
                    match.isFinished ? "opacity-80" : "border-gold/20 bg-gold/5"
                )}>
                    <div className="flex justify-between items-center text-[8px] text-gray-500 font-black mb-4 uppercase tracking-widest">
                        <span>MATCH ID: {match.id.slice(-6).toUpperCase()}</span>
                        {view === 'admin' && match.isFinished && (
                            <button onClick={() => onReset(match.id)} className="text-red-500 hover:underline">RESET</button>
                        )}
                    </div>
                    
                    <div className="space-y-3">
                        <div className="flex justify-between items-center group">
                            <span className="text-sm font-bold uppercase truncate pr-4 text-white group-hover:text-gold transition-colors">{h?.name || 'TBD'}</span>
                            {view === 'admin' && !match.isFinished ? (
                                <input 
                                    type="number" 
                                    value={hS} 
                                    onChange={e => setHS(parseInt(e.target.value) || 0)} 
                                    className="w-12 bg-black border border-white/20 rounded text-center font-black p-1 focus:border-gold outline-none"
                                />
                            ) : (
                                <span className={cn("text-2xl font-black", match.isFinished && match.homeScore > match.awayScore ? "text-gold" : "text-white")}>
                                    {match.isFinished ? match.homeScore : '-'}
                                </span>
                            )}
                        </div>
                        
                        <div className="h-[1px] bg-white/5 w-1/4 mx-auto"></div>

                        <div className="flex justify-between items-center group">
                            <span className="text-sm font-bold uppercase truncate pr-4 text-white group-hover:text-gold transition-colors">{a?.name || 'TBD'}</span>
                            {view === 'admin' && !match.isFinished ? (
                                <input 
                                    type="number" 
                                    value={aS} 
                                    onChange={e => setAS(parseInt(e.target.value) || 0)} 
                                    className="w-12 bg-black border border-white/20 rounded text-center font-black p-1 focus:border-gold outline-none"
                                />
                            ) : (
                                <span className={cn("text-2xl font-black", match.isFinished && match.awayScore > match.homeScore ? "text-gold" : "text-white")}>
                                    {match.isFinished ? match.awayScore : '-'}
                                </span>
                            )}
                        </div>
                    </div>

                    {view === 'admin' && !match.isFinished && (
                        <button 
                            onClick={() => onSave(match.id, hS, aS)}
                            className="w-full bg-gold text-black py-2 mt-4 text-[10px] font-black uppercase italic rounded-sm hover:scale-[1.02] active:scale-95 transition-all"
                        >
                            XÁC NHẬN KẾT QUẢ
                        </button>
                    )}
                </div>
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
